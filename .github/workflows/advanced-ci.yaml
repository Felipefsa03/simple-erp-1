name: Advanced CI / Self-Healing Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main, feature/* ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      - name: Install dependencies (backend)
        run: npm ci --prefix simple-erp
        
      - name: Install dependencies (frontend)
        run: npm ci --prefix simple-erp/frontend
        
      - name: TypeScript type check (frontend)
        run: npx tsc -p simple-erp/frontend/tsconfig.json --noEmit
        continue-on-error: true
        
      - name: Lint (frontend)
        run: npm run lint --prefix simple-erp
        continue-on-error: true
        
      - name: Build frontend (Vite)
        run: npm run build --prefix simple-erp/frontend
        
      - name: Self-Healing patch sanity (dry-run)
        run: |
          echo "Running self-healing dry-run (no destructive changes)"
          echo "This step can be extended to validate patch generation without applying changes."
          
      - name: CI Status
        run: echo "CI completed for Advanced pipeline."

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: luminaflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Verify Docker image
        run: docker run --rm luminaflow:latest node -e "console.log('Docker image OK')"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run npm audit
        run: npm audit --prefix simple-erp --audit-level=moderate || true
        
      - name: Run npm audit (frontend)
        run: npm audit --prefix simple-erp/frontend --audit-level=moderate || true
