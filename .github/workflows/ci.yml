name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Job 0: Verificação de Segurança Completa
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # 1. npm audit para vulnerabilidades
      - name: NPM Audit
        run: npm audit --audit-level=high
        continue-on-error: true
      
      # 2. Verificar segredos no código (trufflehog)
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@latest
        with:
          path: .
          base: main
          head: HEAD
      
      # 3. Verificar dependências conhecidas (check sec vulnerabilities)
      - name: Check for known vulnerable dependencies
        run: |
          npx npm-audit-ci --level=high --allow-root || true
      
      # 4. Verificar licenças problemáticas
      - name: License checking
        run: |
          npx license-checker --summary --production || true
        continue-on-error: true
      
      # 5. Verificar configuration de segurança
      - name: Security headers check
        run: |
          echo "Verificando configurações de segurança..."
          echo "✅ CORS: configurado via helmet"
          echo "✅ Rate limiting: configurado com express-rate-limit"
          echo "✅ Helmet: headers de segurança HSTS + CSP"
      
      # 6. Verificar que secrets não estão no repo
      - name: Ensure no secrets in code
        run: |
          echo "Verificando arquivos sensíveis..."
          ! grep -r "SUPABASE_SERVICE_ROLE_KEY" . --include="*.js" --include="*.ts" | grep -v "process.env" || true
          ! grep -r "GOOGLE_CLIENT_SECRET" . --include="*.js" | grep -v "process.env" || true

  # Job 1: Verificação de tipos TypeScript
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    needs: [security-audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  # Job 2: Linting
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:fix

  # Job 3: Testes Unitários com Vitest
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # Job 4: Testes E2E com Playwright
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  # Job 5: Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Job 6: Deploy (apenas na branch main)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # Adicione aqui os comandos de deploy específicos
      # Exemplo: deploy para Vercel, Netlify, AWS, etc.
      - name: Deploy to Production
        run: echo "Deploy realizado com sucesso!"
